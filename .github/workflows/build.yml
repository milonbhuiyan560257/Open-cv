name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev python3-dev libsqlite3-dev zlib1g-dev zip unzip clang lld libltdl-dev pkg-config cmake

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip setuptools
          pip install "cython==0.29.36"
          pip install "buildozer==1.5.0"

      - name: Clean Previous Builds & Build APK
        env:
          ANDROID_NDK_HOME: ""
          ANDROID_NDK_ROOT: ""
        run: |
          buildozer android clean
          buildozer -v android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-opencv-app
          path: bin/*.apk

      - name: Build APK with Buildozer
        env:
          ANDROID_NDK_HOME: ""
          ANDROID_NDK_ROOT: ""
        run: |
          buildozer -v android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-opencv-app
          path: bin/*.apk

      - name: Build APK with Buildozer
        env:
          ANDROID_NDK_HOME: ""
          ANDROID_NDK_ROOT: ""
          APP_ANDROID_NUMPY_OLD_BUILD: "1"
        run: |
          buildozer -v android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-opencv-app
          path: bin/*.apk

      - name: Build APK with Buildozer
        env:
          ANDROID_NDK_HOME: ""
          ANDROID_NDK_ROOT: ""
        run: |
          buildozer -v android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-opencv-app
          path: bin/*.apk
